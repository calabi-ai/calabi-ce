# =============================================================================
# Calabi Community Edition Gateway
# =============================================================================
# Single entry point at :8080. Proxies directly to the production Calabi UI
# (OM at :8585 with CE gating baked into the image).
#
# Architecture:
#   :8080 / → Calabi Platform UI
#   :8080 /bi/ → CalabiIQ BI Analytics
#   :8080 /api/license/ → License proxy (CE limits)
# =============================================================================

upstream catalogue {
    server calabi-catalogue:8585;
}

upstream bi {
    server calabi-bi:8088;
}

upstream license_proxy {
    server calabi-license-proxy:8090;
}

server {
    listen 8080;
    server_name _;

    client_max_body_size        256m;
    large_client_header_buffers 8 32k;
    client_header_buffer_size   32k;

    # ── CE Enforcement: User + Asset Limits ─────────────────────────
    # Internal auth_request endpoints (not accessible externally)
    location = /_enforce/users {
        internal;
        proxy_pass http://license_proxy/enforce/users;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-Method $request_method;
    }

    location = /_enforce/assets {
        internal;
        proxy_pass http://license_proxy/enforce/assets;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    location = /_enforce/restricted {
        internal;
        proxy_pass http://license_proxy/enforce/restricted;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    # User creation — enforce 5-user limit (POST to /users or /users/signup)
    location ~ ^/api/v1/users(/signup)?$ {
        auth_request /_enforce/users;
        auth_request_set $auth_status $upstream_status;

        proxy_pass http://catalogue;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bot/App creation — GET allowed (UI needs to list apps), POST/PUT/DELETE blocked in CE
    location ~ ^/api/v1/(bots|apps|applications) {
        # Only block writes — reads pass through so the UI doesn't break
        if ($request_method ~ ^(POST|PUT|PATCH|DELETE)$) {
            return 403 '{"error":"RESTRICTED","tier":"community","message":"This feature is not available in Community Edition. Upgrade to unlock.","upgrade_url":"https://calabi.dev/pricing"}';
        }

        proxy_pass http://catalogue;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pipeline/ML service creation — enforce asset limit
    location ~ ^/api/v1/services/(pipelineServices|mlmodelServices) {
        auth_request /_enforce/restricted;

        proxy_pass http://catalogue;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Calabi Platform UI ─────────────────────────────────────────────
    # All platform routes served by catalogue backend.
    location / {
        proxy_pass http://catalogue;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── CalabiIQ BI Analytics ────────────────────────────────────────
    # /bi/ is the main prefix for the BI engine.
    # Gateway passes REMOTE_USER header for auto-authentication.

    location /bi/ {
        proxy_pass http://bi/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header REMOTE_USER "admin";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
    }

    location /superset/ {
        proxy_pass http://bi/superset/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header REMOTE_USER "admin";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location /static/assets/ {
        proxy_pass http://bi/static/assets/;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1d;
    }

    location /login/ {
        proxy_pass http://bi/login/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /logout/ {
        proxy_pass http://bi/logout/;
        proxy_set_header Host $host;
    }

    location /dashboard/ {
        proxy_pass http://bi/dashboard/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /chart/ {
        proxy_pass http://bi/chart/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── BI API paths ────────────────────────────────────────────────
    # BI engine API routes (dashboard, chart, dataset, etc.).
    location /api/v1/dashboard/ {
        proxy_pass http://bi/api/v1/dashboard/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/chart/ {
        proxy_pass http://bi/api/v1/chart/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/dataset/ {
        proxy_pass http://bi/api/v1/dataset/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/security/ {
        proxy_pass http://bi/api/v1/security/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/me/ {
        proxy_pass http://bi/api/v1/me/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/async_event/ {
        proxy_pass http://bi/api/v1/async_event/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/log/ {
        proxy_pass http://bi/api/v1/log/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/saved_query/ {
        proxy_pass http://bi/api/v1/saved_query/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/query/ {
        proxy_pass http://bi/api/v1/query/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/database/ {
        proxy_pass http://bi/api/v1/database/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/report/ {
        proxy_pass http://bi/api/v1/report/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/css_template/ {
        proxy_pass http://bi/api/v1/css_template/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/explore/ {
        proxy_pass http://bi/api/v1/explore/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # BI static files (CSS/JS/images)
    location /static/appbuilder/ {
        proxy_pass http://bi/static/appbuilder/;
        proxy_set_header Host $host;
    }
    location /static/superset/ {
        proxy_pass http://bi/static/superset/;
        proxy_set_header Host $host;
    }

    # ── License Proxy API ────────────────────────────────────────────
    location /api/license/ {
        proxy_pass http://license_proxy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health endpoint ──────────────────────────────────────────────
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","edition":"community","version":"1.0.0"}';
    }
}
