# =============================================================================
# Calabi Starter Gateway
# =============================================================================
# Single entry point at :8080. CE routes + Data Engineering routes.
#
# CE:
#   :8080 /              → Calabi Platform UI
#   :8080 /bi/           → CalabiIQ BI Analytics
#   :8080 /api/license/  → License proxy
#
# Data Engineering (Starter-only):
#   :8080 /airflow/      → Airflow UI + API
#   :8080 /airbyte/      → Airbyte API (engine)
#   :8080 /notebooks/    → Jupyter Lab
#   :8080 /ide/          → VS Code (code-server)
# =============================================================================

upstream catalogue       { server calabi-catalogue:8585; }
upstream bi              { server calabi-bi:8088; }
upstream license_proxy   { server calabi-license-proxy:8090; }
upstream airflow         { server airflow-webserver:8080; }
upstream notebooks       { server calabi-notebooks:8888; }
upstream ide             { server calabi-ide:8080; }
# Note: Airbyte upstream intentionally omitted in Starter v1. Ingestion
# ships as a Pro-tier add-on with branded Calabi Connect UI.

server {
    listen 8080;
    server_name _;

    client_max_body_size        256m;
    large_client_header_buffers 8 32k;
    client_header_buffer_size   32k;

    # ── CE Enforcement: User + Asset Limits ─────────────────────────
    # Internal auth_request endpoints (not accessible externally)

    location = /_enforce/users {
        internal;
        proxy_pass http://license_proxy/enforce/users;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    location = /_enforce/assets {
        internal;
        proxy_pass http://license_proxy/enforce/assets;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    location = /_enforce/restricted {
        internal;
        proxy_pass http://license_proxy/enforce/restricted;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    # Login — filter out the default OM admin account (blocked in CE).
    # The catalogue-init migration always recreates admin@open-metadata.org;
    # the license proxy intercepts the login and rejects that account.
    location = /api/v1/users/login {
        proxy_pass http://license_proxy/proxy/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
        proxy_read_timeout 30s;
    }

    # User creation — enforce 5-user limit (writes only).
    # Routed through the license proxy which transparently forwards to catalogue.
    # The proxy checks the real HTTP method and blocks writes when limit is reached.
    location ~ ^/api/v1/users(/signup)?$ {
        proxy_pass http://license_proxy/proxy/users$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Preserve all HTTP methods (GET, POST, PUT, PATCH, DELETE)
        proxy_method $request_method;
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
        proxy_read_timeout 60s;
    }

    # Bot/App creation — block ONLY creating new custom apps (exact path).
    # Sub-paths (trigger/deploy/configure/schedule) MUST pass through so
    # system apps like DatabaseIngestion, DataInsights, SearchIndexing work.
    location ~ ^/api/v1/(bots|apps|applications)$ {
        if ($request_method ~ ^(POST|PUT|PATCH|DELETE)$) {
            add_header Content-Type "application/json" always;
            return 403 '{"error":"RESTRICTED","tier":"community","message":"Creating custom apps is not available in Community Edition. Upgrade to unlock.","upgrade_url":"https://calabi.dev/pricing"}';
        }
        proxy_pass http://catalogue;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # App sub-path operations — allowed (needed for ingestion, reindex, etc.)
    location ~ ^/api/v1/(bots|apps|applications)/ {
        proxy_pass http://catalogue;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }

    # Pipeline/ML service creation — block writes in CE, allow reads
    location ~ ^/api/v1/services/(pipelineServices|mlmodelServices) {
        if ($request_method ~ ^(POST|PUT|PATCH|DELETE)$) {
            add_header Content-Type "application/json" always;
            return 403 '{"error":"RESTRICTED","tier":"community","message":"Pipeline and ML Model services are not available in Community Edition. Upgrade to unlock.","upgrade_url":"https://calabi.dev/pricing"}';
        }

        proxy_pass http://catalogue;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default JSON error pages (so UI never renders raw HTML 403/500)
    error_page 403 @error_403;
    location @error_403 {
        internal;
        default_type application/json;
        add_header Content-Type "application/json" always;
        return 403 '{"error":"FORBIDDEN","message":"Access denied."}';
    }

    # ──────────────────────────────────────────────────────────────────
    # DATA ENGINEERING backends (Starter-only)
    # ──────────────────────────────────────────────────────────────────

    # Airbyte proxy short-circuit — returns empty JSON so the Data
    # Engineering page's Ingestion section gracefully shows "0 sources /
    # 0 destinations" instead of 500 errors. When the branded Calabi
    # Connect UI ships (Pro tier), this block is replaced with a real
    # proxy_pass to airbyte-server.
    location ~ ^/api/v1/airbyte/(workspaces|connections|sources|destinations|jobs|operations)$ {
        default_type application/json;
        add_header Content-Type "application/json" always;
        return 200 '{"data":[],"paging":{"total":0,"offset":0,"limit":100}}';
    }

    # Airflow — DAG UI + REST API
    # The prod Calabi UI's Data Engineering page queries /airflow/api/v1/...
    # directly for live DAG/task/run metrics.
    location /airflow/ {
        proxy_pass http://airflow/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # Jupyter Notebooks — used by Data Engineering + Data Science pages
    # Jupyter requires websockets for live kernels; proxy_http_version 1.1
    # + Upgrade headers are essential.
    location /notebooks/ {
        proxy_pass http://notebooks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;  # long poll for kernels
        proxy_buffering off;
    }

    # VS Code IDE (code-server) — websockets required
    location /ide/ {
        proxy_pass http://ide/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    # ── Calabi Platform UI ─────────────────────────────────────────────
    # All platform routes served by catalogue backend.
    location / {
        proxy_pass http://catalogue;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── CalabiIQ BI Analytics ────────────────────────────────────────
    # /bi/ is the main prefix for the BI engine.
    # Gateway passes REMOTE_USER header for auto-authentication.

    location /bi/ {
        proxy_pass http://bi/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header REMOTE_USER "admin";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
    }

    location /superset/ {
        proxy_pass http://bi/superset/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header REMOTE_USER "admin";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location /static/assets/ {
        proxy_pass http://bi/static/assets/;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1d;
    }

    location /login/ {
        proxy_pass http://bi/login/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /logout/ {
        proxy_pass http://bi/logout/;
        proxy_set_header Host $host;
    }

    location /dashboard/ {
        proxy_pass http://bi/dashboard/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /chart/ {
        proxy_pass http://bi/chart/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── BI API paths ────────────────────────────────────────────────
    # BI engine API routes (dashboard, chart, dataset, etc.).
    location /api/v1/dashboard/ {
        proxy_pass http://bi/api/v1/dashboard/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/chart/ {
        proxy_pass http://bi/api/v1/chart/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/dataset/ {
        proxy_pass http://bi/api/v1/dataset/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/security/ {
        proxy_pass http://bi/api/v1/security/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/me/ {
        proxy_pass http://bi/api/v1/me/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/async_event/ {
        proxy_pass http://bi/api/v1/async_event/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/log/ {
        proxy_pass http://bi/api/v1/log/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/saved_query/ {
        proxy_pass http://bi/api/v1/saved_query/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/query/ {
        proxy_pass http://bi/api/v1/query/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/database/ {
        proxy_pass http://bi/api/v1/database/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/report/ {
        proxy_pass http://bi/api/v1/report/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/css_template/ {
        proxy_pass http://bi/api/v1/css_template/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/explore/ {
        proxy_pass http://bi/api/v1/explore/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # SQL Lab page + API (must proxy to BI, not catalogue)
    location /sqllab/ {
        proxy_pass http://bi/sqllab/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }
    location /api/v1/sqllab/ {
        proxy_pass http://bi/api/v1/sqllab/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    # /explore/ is used by BOTH OpenMetadata (data assets browser) and
    # Superset (chart builder). Route by query param:
    #   ?slice_id= or ?dataset_id= → Superset
    #   everything else → OpenMetadata catalogue (default)
    location /explore/ {
        set $explore_backend "catalogue";
        if ($arg_slice_id)   { set $explore_backend "bi"; }
        if ($arg_dataset_id) { set $explore_backend "bi"; }
        if ($arg_form_data)  { set $explore_backend "bi"; }

        # Proxy to the chosen backend
        proxy_pass http://$explore_backend;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }
    location /tablemodelview/ {
        proxy_pass http://bi/tablemodelview/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /databaseview/ {
        proxy_pass http://bi/databaseview/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /savedqueryview/ {
        proxy_pass http://bi/savedqueryview/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /queryview/ {
        proxy_pass http://bi/queryview/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /csstemplatemodelview/ {
        proxy_pass http://bi/csstemplatemodelview/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /annotationlayer/ {
        proxy_pass http://bi/annotationlayer/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /alert/ {
        proxy_pass http://bi/alert/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /report/ {
        proxy_pass http://bi/report/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/annotation_layer/ {
        proxy_pass http://bi/api/v1/annotation_layer/;
        proxy_set_header Host $host;
        proxy_set_header REMOTE_USER "admin";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # BI static files (CSS/JS/images)
    location /static/appbuilder/ {
        proxy_pass http://bi/static/appbuilder/;
        proxy_set_header Host $host;
    }
    location /static/superset/ {
        proxy_pass http://bi/static/superset/;
        proxy_set_header Host $host;
    }

    # ── License Proxy API ────────────────────────────────────────────
    location /api/license/ {
        proxy_pass http://license_proxy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health endpoint ──────────────────────────────────────────────
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","edition":"community","version":"1.0.0"}';
    }
}
